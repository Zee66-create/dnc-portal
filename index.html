<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC | DNC Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, onSnapshot, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration for project: mcc-dnc-portal-4bc1a
        const firebaseConfig = {
            apiKey: "AIzaSyAhqD4MPcFfiNAPakwnP6LSgcYPca-c4hg",
            authDomain: "mcc-dnc-portal-4bc1a.firebaseapp.com",
            projectId: "mcc-dnc-portal-4bc1a",
            storageBucket: "mcc-dnc-portal-4bc1a.firebasestorage.app",
            messagingSenderId: "647629631979",
            appId: "1:647629631979:web:389e484050ea08863a29ae",
            measurementId: "G-24G5F9TM5T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- AUTH LOGIC ---
        window.handleLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin123") showPage(true, "ADMIN");
            else if (u === "staff" && p === "staff123") showPage(false, "STAFF");
            else alert("Invalid Credentials");
        };

        function showPage(isAdmin, role) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userBadge').innerText = role;
            if(isAdmin) {
                document.getElementById('adminControls').classList.remove('hidden');
                initAdminSystem();
            }
        }

        // --- REAL-TIME SEARCH ---
        let typingTimer;
        window.searchDatabase = () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(async () => {
                const raw = document.getElementById('searchBox').value;
                const clean = raw.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();
                const box = document.getElementById('statusBox');

                if(clean.length < 2) { box.classList.add('hidden'); return; }
                box.classList.remove('hidden');

                const q = query(collection(db, "dnc_names"), where("name_clean", "==", clean), limit(1));
                const snap = await getDocs(q);
                const isMatch = !snap.empty;

                await addDoc(collection(db, "search_history"), {
                    searched_name: clean,
                    was_match: isMatch,
                    staff_member: document.getElementById('user').value || "Staff",
                    timestamp: new Date()
                });

                if(isMatch) {
                    box.className = "mt-8 p-12 rounded-[40px] border-8 bg-red-50 border-red-500 text-red-900 shadow-2xl scale-105 transition-all";
                    document.getElementById('statusTitle').innerText = "LITIGATOR MATCH";
                    document.getElementById('statusIcon').className = "fas fa-skull-crossbones text-7xl mb-4 text-red-600";
                } else {
                    box.className = "mt-8 p-12 rounded-[40px] border-8 bg-green-50 border-green-500 text-green-900 shadow-2xl scale-105 transition-all";
                    document.getElementById('statusTitle').innerText = "CLEAN";
                    document.getElementById('statusIcon').className = "fas fa-check-circle text-7xl mb-4 text-green-600";
                }
            }, 400);
        };

        // --- ADMIN DASHBOARD ---
        function initAdminSystem() {
            onSnapshot(collection(db, "dnc_names"), s => {
                document.getElementById('countDisplay').innerText = s.size.toLocaleString();
            });

            const qH = query(collection(db, "search_history"), orderBy("timestamp", "desc"), limit(12));
            onSnapshot(qH, s => {
                let h = '';
                s.forEach(d => {
                    const data = d.data();
                    const color = data.was_match ? 'text-red-500 bg-red-50' : 'text-green-600 bg-green-50';
                    h += `<div class="flex justify-between items-center p-3 border-b border-slate-50">
                            <span class="font-bold text-slate-700">${data.searched_name.toUpperCase()}</span>
                            <span class="px-3 py-1 rounded-full text-[10px] font-black ${color}">${data.was_match ? 'MATCH' : 'CLEAN'}</span>
                          </div>`;
                });
                document.getElementById('historyLogs').innerHTML = h;
            });
        }

        // --- BULK DATA UPLOAD ---
        window.uploadToCloud = async () => {
            const raw = document.getElementById('bulkInput').value;
            const names = raw.split('\n').filter(n => n.trim().length > 1);
            const batch = writeBatch(db);
            
            names.forEach(n => {
                const clean = n.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();
                const ref = doc(collection(db, "dnc_names"));
                batch.set(ref, { name: n, name_clean: clean });
            });

            await batch.commit();
            alert("Added " + names.length + " records!");
            document.getElementById('bulkInput').value = "";
        };
    </script>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-md text-center border-t-8 border-slate-900">
            <img src="logo.png" class="h-20 mx-auto mb-8">
            <h1 class="text-3xl font-black text-slate-800 mb-2 uppercase italic">DNC Portal</h1>
            <p class="text-slate-400 text-xs mb-10 tracking-widest uppercase">Firebase Cloud Edition</p>
            <input type="text" id="user" placeholder="Username" class="w-full p-5 mb-4 border-2 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full p-5 mb-8 border-2 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 font-bold">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black hover:bg-blue-600 transition-all shadow-lg">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white p-5 border-b flex justify-between items-center sticky top-0 z-50">
            <img src="logo.png" class="h-10">
            <div class="flex items-center gap-4">
                <span id="userBadge" class="bg-slate-100 px-4 py-1.5 rounded-full text-[11px] font-black text-slate-500 uppercase tracking-tighter"></span>
                <button onclick="location.reload()" class="text-slate-300 hover:text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto p-8">
            <div class="bg-white p-12 rounded-[40px] border shadow-sm text-center">
                <h2 class="text-2xl font-black text-slate-800 mb-8 uppercase tracking-widest italic">Verification Scrub</h2>
                <input type="text" id="searchBox" onkeyup="searchDatabase()" placeholder="Type full name here..." class="w-full p-6 text-3xl border-4 rounded-3xl text-center font-bold bg-[#fcfdff] focus:border-blue-500 outline-none text-slate-700">
                
                <div id="statusBox" class="hidden">
                    <i id="statusIcon"></i>
                    <h3 id="statusTitle" class="text-5xl font-black italic"></h3>
                </div>
            </div>

            <div id="adminControls" class="hidden mt-10 space-y-8">
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-[35px] text-white">
                        <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest">Master Records</p>
                        <h4 id="countDisplay" class="text-5xl font-black italic">...</h4>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-[35px] text-white">
                        <p class="text-slate-400 text-[11px] font-black uppercase tracking-widest">Status</p>
                        <h4 class="text-sm font-black text-green-400 flex items-center gap-3 mt-4"><span class="h-3 w-3 rounded-full bg-green-500 animate-pulse"></span> SYSTEM ONLINE</h4>
                    </div>
                </div>

                <div class="bg-white rounded-[40px] border shadow-sm p-8">
                    <p class="text-[11px] font-black text-slate-300 mb-6 uppercase tracking-widest">Live Activity Log</p>
                    <div id="historyLogs" class="space-y-1"></div>
                </div>

                <div class="bg-slate-900 p-10 rounded-[45px] text-white">
                    <p class="mb-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Add Names to Cloud Database</p>
                    <textarea id="bulkInput" placeholder="Paste names from your list here (one per line)..." class="w-full h-48 p-6 bg-slate-800 border-none rounded-3xl mb-6 outline-none text-slate-300 font-mono"></textarea>
                    <button onclick="uploadToCloud()" class="w-full bg-blue-600 p-6 rounded-2xl font-black text-xl hover:bg-blue-500 transition-all shadow-xl">SYNC TO CLOUD</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
