<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC | Cloud Sync Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @keyframes slideUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-pop { animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .clock-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, onSnapshot, writeBatch, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhqD4MPcFfiNAPakwnP6LSgcYPca-c4hg",
            authDomain: "mcc-dnc-portal-4bc1a.firebaseapp.com",
            projectId: "mcc-dnc-portal-4bc1a",
            storageBucket: "mcc-dnc-portal-4bc1a.firebasestorage.app",
            messagingSenderId: "647629631979",
            appId: "1:647629631979:web:389e484050ea08863a29ae",
            measurementId: "G-24G5F9TM5T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CLOCK LOGIC ---
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.querySelectorAll('.clock-local').forEach(el => el.innerText = new Date().toLocaleTimeString('en-US', options));
            document.querySelectorAll('.clock-est').forEach(el => {
                el.innerText = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/New_York' });
            });
        }
        setInterval(updateClocks, 1000);

        // --- AUTH ---
        window.handleLogin = () => {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin123") showPage(true, "ADMIN");
            else if (u === "staff" && p === "staff123") showPage(false, "STAFF");
            else alert("Invalid Login");
        };

        function showPage(isAdmin, role) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userBadge').innerText = role;
            if(isAdmin) document.getElementById('adminControls').classList.remove('hidden');
            initDataSync();
        }

        // --- SEARCH ENGINE (SPLIT LOGIC) ---
        window.runGlobalSearch = async () => {
            const val = document.getElementById('globalSearch').value.trim();
            const box = document.getElementById('statusBox');
            
            // Auto-Split First and Last Name
            const parts = val.split(' ');
            const first = parts[0] || "";
            const last = parts.slice(1).join(' ') || "";
            
            document.getElementById('displayFirst').value = first.toUpperCase();
            document.getElementById('displayLast').value = last.toUpperCase();

            if (val.length < 2) { box.classList.add('hidden'); return; }

            const clean = val.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();
            const q = query(collection(db, "dnc_names"), where("name_clean", "==", clean), limit(1));
            const snap = await getDocs(q);
            const isMatch = !snap.empty;

            box.classList.remove('hidden');
            if(isMatch) {
                box.className = "mt-6 p-10 rounded-[40px] border-4 bg-red-50 border-red-500 text-red-700 animate-pop block";
                document.getElementById('statusIcon').className = "fas fa-user-slash text-6xl mb-4";
                document.getElementById('statusTitle').innerText = "LITIGATOR MATCH";
                document.getElementById('statusSub').innerText = `DNC Match found for "${val}"`;
            } else {
                box.className = "mt-6 p-10 rounded-[40px] border-4 bg-green-50 border-green-500 text-green-700 animate-pop block";
                document.getElementById('statusIcon').className = "fas fa-check-circle text-6xl mb-4";
                document.getElementById('statusTitle').innerText = "CLEAN";
                document.getElementById('statusSub').innerText = `No match found for "${val}"`;
            }

            // Log Search
            await addDoc(collection(db, "search_history"), {
                name: val, match: isMatch, user: document.getElementById('userBadge').innerText, time: new Date()
            });
        };

        // --- ADMIN: DELETE SYNCED DATA ---
        window.purgeDatabase = async () => {
            if(!confirm("ARE YOU SURE? This will delete ALL synced records.")) return;
            const snap = await getDocs(collection(db, "dnc_names"));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("Database Cleared Successfully.");
        };

        function initDataSync() {
            onSnapshot(collection(db, "dnc_names"), s => document.getElementById('countDisplay').innerText = s.size.toLocaleString());
            const qH = query(collection(db, "search_history"), orderBy("time", "desc"), limit(8));
            onSnapshot(qH, s => {
                let h = '';
                s.forEach(d => {
                    const data = d.data();
                    h += `<div class="flex justify-between p-3 border-b text-sm">
                            <span class="font-bold text-slate-600">${data.name.toUpperCase()}</span>
                            <span class="font-black ${data.match ? 'text-red-500' : 'text-green-500'}">${data.match ? 'MATCH' : 'CLEAN'}</span>
                          </div>`;
                });
                document.getElementById('historyLogs').innerHTML = h;
            });
        }

        window.uploadToCloud = async () => {
            const raw = document.getElementById('bulkInput').value;
            const names = raw.split('\n').filter(n => n.trim().length > 1);
            const batch = writeBatch(db);
            names.forEach(n => {
                const clean = n.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();
                batch.set(doc(collection(db, "dnc_names")), { name: n, name_clean: clean });
            });
            await batch.commit();
            document.getElementById('bulkInput').value = "";
            alert("Synced " + names.length + " Names.");
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-sm text-center border-b-8 border-slate-900">
            <img src="logo.png" class="h-16 mx-auto mb-8">
            <input type="text" id="user" placeholder="User" class="w-full p-4 mb-4 bg-slate-50 rounded-2xl outline-none font-bold border">
            <input type="password" id="pass" placeholder="Pass" class="w-full p-4 mb-8 bg-slate-50 rounded-2xl outline-none font-bold border">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-lg">LOGIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50">
            <img src="logo.png" class="h-8">
            <div class="flex items-center gap-6">
                <div class="flex gap-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <div class="text-center"><p>Local</p><p class="clock-local text-slate-800 text-xs"></p></div>
                    <div class="text-center"><p>New York</p><p class="clock-est text-slate-800 text-xs"></p></div>
                </div>
                <span id="userBadge" class="bg-slate-900 text-white px-4 py-1 rounded-full text-[10px] font-bold"></span>
                <button onclick="location.reload()" class="text-slate-300 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto p-8">
            <div class="bg-white p-12 rounded-[60px] shadow-sm border border-slate-100 text-center">
                <h2 class="text-[10px] font-black text-slate-300 mb-8 uppercase tracking-[0.5em]">Name Verification Scrub</h2>
                
                <div class="relative mb-10">
                    <input type="text" id="globalSearch" onkeyup="runGlobalSearch()" placeholder="Type or paste full name..." 
                        class="w-full p-6 text-2xl border-4 border-slate-100 rounded-3xl text-center font-bold bg-slate-50 focus:border-blue-500 outline-none transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-dashed">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">First Name Result</p>
                        <input type="text" id="displayFirst" readonly class="w-full text-center font-black text-slate-700 bg-transparent outline-none uppercase">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-dashed">
                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Last Name Result</p>
                        <input type="text" id="displayLast" readonly class="w-full text-center font-black text-slate-700 bg-transparent outline-none uppercase">
                    </div>
                </div>
                
                <div id="statusBox" class="hidden">
                    <i id="statusIcon"></i>
                    <h3 id="statusTitle" class="text-4xl font-black italic tracking-tighter"></h3>
                    <p id="statusSub" class="text-xs font-bold uppercase opacity-60 mt-2"></p>
                </div>
            </div>

            <div id="adminControls" class="hidden mt-10 space-y-8">
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-slate-900 p-8 rounded-[40px] text-white">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Master Cloud Sync</p>
                        <h4 id="countDisplay" class="text-5xl font-black italic">...</h4>
                    </div>
                    <div class="bg-slate-900 p-8 rounded-[40px] flex flex-col justify-center">
                        <button onclick="purgeDatabase()" class="bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-lg transition-all active:scale-95">
                            <i class="fas fa-trash-alt mr-2"></i> Purge Synced Data
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-[40px] border p-8 shadow-sm">
                    <h3 class="text-slate-300 font-black text-[10px] uppercase mb-6 tracking-widest">Live Activity Feed</h3>
                    <div id="historyLogs"></div>
                </div>

                <div class="bg-slate-900 p-10 rounded-[50px] text-white">
                    <textarea id="bulkInput" placeholder="Paste names to sync..." class="w-full h-32 p-6 bg-slate-800 border-0 rounded-3xl mb-6 outline-none text-slate-300 font-mono"></textarea>
                    <button onclick="uploadToCloud()" class="w-full bg-blue-600 p-5 rounded-2xl font-black text-lg hover:bg-blue-500 shadow-xl transition-all">SYNC TO MASTER LIST</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
