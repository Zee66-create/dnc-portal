<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC | DNC Cloud Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Smooth Entry Animations */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .pulse-soft { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, onSnapshot, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhqD4MPcFfiNAPakwnP6LSgcYPca-c4hg",
            authDomain: "mcc-dnc-portal-4bc1a.firebaseapp.com",
            projectId: "mcc-dnc-portal-4bc1a",
            storageBucket: "mcc-dnc-portal-4bc1a.firebasestorage.app",
            messagingSenderId: "647629631979",
            appId: "1:647629631979:web:389e484050ea08863a29ae",
            measurementId: "G-24G5F9TM5T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleLogin = () => {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin123") showPage(true, "ADMIN");
            else if (u === "staff" && p === "staff123") showPage(false, "STAFF");
            else alert("Invalid Login");
        };

        function showPage(isAdmin, role) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userBadge').innerText = role;
            if(isAdmin) {
                document.getElementById('adminControls').classList.remove('hidden');
                initAdminSystem();
            }
        }

        // --- FLUID SEARCH LOGIC ---
        let typingTimer;
        window.searchDatabase = () => {
            const raw = document.getElementById('searchBox').value;
            const box = document.getElementById('statusBox');
            
            clearTimeout(typingTimer);
            
            // Clean logic
            const clean = raw.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();

            if(clean.length < 2) { 
                box.classList.add('hidden'); 
                return; 
            }

            typingTimer = setTimeout(async () => {
                const q = query(collection(db, "dnc_names"), where("name_clean", "==", clean), limit(1));
                const snap = await getDocs(q);
                const isMatch = !snap.empty;

                // Log search
                await addDoc(collection(db, "search_history"), {
                    searched_name: clean,
                    was_match: isMatch,
                    staff_member: document.getElementById('userBadge').innerText || "User",
                    timestamp: new Date()
                });

                // Trigger Instant Visual Warning
                box.classList.remove('hidden', 'animate-pop');
                void box.offsetWidth; // Force CSS reflow for animation restart
                box.classList.add('animate-pop');

                if(isMatch) {
                    box.className = "mt-8 p-12 rounded-[50px] border-[6px] bg-red-50 border-red-500 text-red-900 shadow-2xl transition-all animate-pop block";
                    document.getElementById('statusTitle').innerText = "LITIGATOR MATCH";
                    document.getElementById('statusIcon').className = "fas fa-skull-crossbones text-7xl mb-4 text-red-600";
                } else {
                    box.className = "mt-8 p-12 rounded-[50px] border-[6px] bg-green-50 border-green-500 text-green-900 shadow-2xl transition-all animate-pop block";
                    document.getElementById('statusTitle').innerText = "CLEAN";
                    document.getElementById('statusIcon').className = "fas fa-check-circle text-7xl mb-4 text-green-600";
                }
            }, 350); 
        };

        function initAdminSystem() {
            onSnapshot(collection(db, "dnc_names"), s => document.getElementById('countDisplay').innerText = s.size.toLocaleString());
            const qH = query(collection(db, "search_history"), orderBy("timestamp", "desc"), limit(10));
            onSnapshot(qH, s => {
                let h = '';
                s.forEach(d => {
                    const data = d.data();
                    const color = data.was_match ? 'text-red-500 bg-red-50' : 'text-green-600 bg-green-50';
                    h += `<div class="flex justify-between items-center p-4 border-b border-slate-50 hover:bg-slate-50 transition-colors">
                            <span class="font-bold text-slate-700">${data.searched_name.toUpperCase()}</span>
                            <span class="px-4 py-1 rounded-full text-[10px] font-black ${color}">${data.was_match ? 'MATCH' : 'CLEAN'}</span>
                          </div>`;
                });
                document.getElementById('historyLogs').innerHTML = h;
            });
        }

        window.uploadToCloud = async () => {
            const raw = document.getElementById('bulkInput').value;
            const names = raw.split('\n').filter(n => n.trim().length > 1);
            if(!names.length) return;
            const batch = writeBatch(db);
            names.forEach(n => {
                const clean = n.replace(/[/\-_@]/g, "").replace(/\s+/g, ' ').trim().toLowerCase();
                batch.set(doc(collection(db, "dnc_names")), { name: n, name_clean: clean });
            });
            await batch.commit();
            alert("Updated Cloud Database!");
            document.getElementById('bulkInput').value = "";
        };
    </script>
</head>
<body class="bg-[#f1f5f9] min-h-screen text-slate-900">

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-w-md text-center border-b-[10px] border-slate-900">
            <img src="logo.png" class="h-20 mx-auto mb-8">
            <input type="text" id="user" placeholder="User" class="w-full p-5 mb-4 bg-slate-100 rounded-2xl outline-none font-bold">
            <input type="password" id="pass" placeholder="Password" class="w-full p-5 mb-8 bg-slate-100 rounded-2xl outline-none font-bold">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black text-xl hover:bg-blue-600 transition-all">START SESSION</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white p-6 border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <img src="logo.png" class="h-10">
            <span id="userBadge" class="bg-slate-900 text-white px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest"></span>
        </nav>

        <div class="max-w-4xl mx-auto p-10">
            <div class="bg-white p-16 rounded-[70px] shadow-sm border border-slate-200 text-center relative overflow-hidden">
                <h2 class="text-xs font-black text-slate-400 mb-8 uppercase tracking-[0.5em]">Global Database Check</h2>
                <input type="text" id="searchBox" onkeyup="searchDatabase()" placeholder="Type Full Name..." 
                    class="w-full p-8 text-4xl border-0 rounded-3xl text-center font-black bg-slate-50 focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder:text-slate-200">
                
                <div id="statusBox" class="hidden">
                    <i id="statusIcon"></i>
                    <h3 id="statusTitle" class="text-5xl font-black italic tracking-tighter"></h3>
                </div>
            </div>

            <div id="adminControls" class="hidden mt-12 space-y-10">
                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-slate-900 p-10 rounded-[50px] text-white shadow-2xl">
                        <p class="text-slate-500 text-[10px] font-black uppercase">Cloud Records</p>
                        <h4 id="countDisplay" class="text-6xl font-black italic">...</h4>
                    </div>
                    <div class="bg-white p-10 rounded-[50px] border shadow-sm flex flex-col justify-center">
                        <p class="text-slate-400 text-[10px] font-black uppercase mb-4 tracking-widest">System Health</p>
                        <span class="text-green-500 font-black text-lg flex items-center gap-3"><span class="h-3 w-3 bg-green-500 rounded-full pulse-soft"></span> LIVE SYNC ACTIVE</span>
                    </div>
                </div>

                <div class="bg-white rounded-[50px] border shadow-sm p-10">
                    <h3 class="text-slate-300 font-black text-[11px] uppercase mb-8 tracking-widest">Recent Activity</h3>
                    <div id="historyLogs" class="divide-y divide-slate-50"></div>
                </div>

                <div class="bg-slate-900 p-12 rounded-[60px] text-white shadow-2xl">
                    <p class="mb-6 text-slate-400 text-xs font-bold uppercase tracking-widest text-center">Batch Update Master List</p>
                    <textarea id="bulkInput" placeholder="Paste names here..." class="w-full h-48 p-8 bg-slate-800 border-0 rounded-[40px] mb-8 outline-none text-slate-300 text-xl"></textarea>
                    <button onclick="uploadToCloud()" class="w-full bg-blue-600 p-8 rounded-3xl font-black text-2xl hover:bg-blue-500 shadow-xl transition-all">SYNC DATABASE</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
